<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Calendar 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* Variáveis de Cores dos Temas */
        :root {
            --bg: #f0f4fa;
            --primary: #3b82f6;
            --primary-light: #eff6ff;
            --card-bg: white;
            --card-border: 1px solid rgba(0,0,0,0.06);
            --card-shadow: 0 2px 20px rgba(15,23,42,0.06);
            --text-main: #0f172a;
            --text-muted: #94a3b8;
            --input-bg: #f8fafc;
            --input-bg-edit: white;
            --event-bg: #fef9ec;
            --event-fg: #b45309;
            --event-border: 1px solid #fcd34d;
        }

        body.theme-green {
            --primary: #059669; --primary-light: #ecfdf5; --bg: #f0f7f4;
        }
        body.theme-purple {
            --primary: #7c3aed; --primary-light: #f5f3ff; --bg: #f3f1fb;
        }
        body.theme-black {
            --primary: #38bdf8;
            --primary-light: #1e293b;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --card-border: 1px solid #334155;
            --card-shadow: 0 4px 20px rgba(0,0,0,0.4);
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --input-bg: #0f172a;
            --input-bg-edit: #1e293b;
            --event-bg: #3f2b11;
            --event-fg: #fcd34d;
            --event-border: 1px solid #78350f;
        }

        /* Cores Fixas para Marcação de Datas (Independente do Tema) */
        .m-red { background-color: #ef4444 !important; color: white !important; }
        .m-yellow { background-color: #eab308 !important; color: #451a03 !important; }
        .m-green { background-color: #22c55e !important; color: white !important; }
        .m-blue { background-color: #3b82f6 !important; color: white !important; }
        .m-purple { background-color: #a855f7 !important; color: white !important; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', 'Segoe UI', sans-serif; }
        
        body { 
            background: var(--bg); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            padding: 20px 16px 40px;
            transition: background 0.3s ease;
        }
        
        .app-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 14px; }

        /* Header */
        .app-header { text-align: center; padding: 8px 0 4px; }
        .app-header h1 { font-size: 22px; font-weight: 900; color: var(--primary); letter-spacing: -0.5px; transition: color 0.3s; }
        .app-header .year { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-top: 2px; }

        /* Seletor de Temas */
        .theme-selector { background: var(--card-bg); border-radius: 16px; padding: 8px; border: var(--card-border); display: flex; gap: 6px; transition: all 0.3s; }
        .theme-btn {
            flex: 1; padding: 8px 4px; border-radius: 10px; border: 2px solid transparent;
            background: transparent; color: var(--text-muted); font-weight: 700; font-size: 12px; cursor: pointer; transition: all 0.2s;
        }
        .theme-btn.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }

        /* Cards Gerais */
        .card { background: var(--card-bg); border-radius: 24px; padding: 20px; box-shadow: var(--card-shadow); border: var(--card-border); transition: all 0.3s ease; }

        /* Navegação do Mês */
        .month-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .nav-btn {
            background: var(--input-bg); border: none; width: 38px; height: 38px; border-radius: 50%;
            cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; font-weight: 700;
            color: var(--text-main); transition: all 0.2s;
        }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .month-title { font-weight: 800; font-size: 19px; text-align: center; color: var(--text-main); }
        .month-sub { font-size: 11px; text-align: center; color: var(--primary); font-weight: 700; letter-spacing: 0.5px; }

        /* Grade do Calendário */
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .weekday { text-align: center; font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; padding-bottom: 8px; }
        
        .day {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; font-size: 13px; font-weight: 600; cursor: pointer;
            position: relative; color: var(--text-main); border: 1px solid transparent; transition: all 0.15s; user-select: none;
        }
        .day.sunday { color: #f87171; }
        .day.event-day { background: var(--event-bg); color: var(--event-fg); border: var(--event-border); font-weight: 700; }
        .day.active-focus { background: var(--primary-light); outline: 2px solid var(--primary); outline-offset: 2px; }
        
        .note-dot { width: 4px; height: 4px; background: var(--primary); border-radius: 50%; position: absolute; bottom: 3px; }
        .day[class*="m-"] .note-dot { background: rgba(255,255,255,0.8); }

        /* Seletor de Cores de Datas */
        .color-picker { display: flex; gap: 8px; align-items: center; margin-top: 5px; }
        .marker-dot {
            width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent;
            transition: transform 0.1s; position: relative;
        }
        .marker-dot:hover { transform: scale(1.1); }
        .marker-dot.selected { border-color: var(--text-main); transform: scale(1.15); }
        .marker-dot.none-color { background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #64748b; }
        body.theme-black .marker-dot.none-color { background: #334155; color: #94a3b8; }

        /* Detalhes */
        .event-badge {
            background: var(--event-bg); color: var(--event-fg); font-size: 11px; font-weight: 700;
            padding: 6px 14px; border-radius: 20px; margin-bottom: 12px;
            display: inline-block; white-space: pre-line; border: var(--event-border); line-height: 1.6;
        }
        .details-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .details-title { font-weight: 800; font-size: 17px; color: var(--text-main); }
        .details-sub { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-top: 1px; }
        
        .actions-div { display: flex; gap: 6px; align-items: center; }
        .action-btn {
            background: var(--input-bg); border: var(--card-border); border-radius: 12px; 
            padding: 7px 11px; font-size: 14px; color: var(--text-muted); cursor: pointer; transition: all 0.2s; font-weight: 700;
        }
        .action-btn.active-btn { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
        .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        textarea {
            width: 100%; border: 1px solid var(--card-border); background: var(--input-bg);
            border-radius: 14px; padding: 14px; font-size: 14px; min-height: 100px; outline: none; color: var(--text-main);
            resize: none; line-height: 1.6; transition: all 0.2s;
        }
        textarea:focus { border-color: var(--primary); background: var(--input-bg-edit); }
        textarea:disabled { opacity: 0.5; }

        /* Mercado Pago */
        .mp-btn {
            background: linear-gradient(135deg, #009ee3 0%, #0070a0 100%);
            color: white; text-align: center; padding: 15px;
            border-radius: 18px; text-decoration: none; font-weight: 700;
            display: block; font-size: 14px; letter-spacing: 0.3px;
            box-shadow: 0 4px 16px rgba(0,158,227,0.35); transition: all 0.3s;
        }
        body.theme-black .mp-btn { box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Header -->
    <div class="app-header">
        <h1>Infinity Calendar</h1>
        <div class="year">2026</div>
    </div>

    <!-- Seletor de Temas -->
    <div class="theme-selector">
        <button class="theme-btn active" id="btn-blue" onclick="setTheme('blue')">🔵 Azul</button>
        <button class="theme-btn" id="btn-green" onclick="setTheme('green')">🟢 Verde</button>
        <button class="theme-btn" id="btn-purple" onclick="setTheme('purple')">🟣 Roxo</button>
        <button class="theme-btn" id="btn-black" onclick="setTheme('black')">⚫ Preto</button>
    </div>

    <!-- Calendário -->
    <div class="card">
        <div class="month-header">
            <button class="nav-btn" id="prev-btn" onclick="changeMonth(-1)">‹</button>
            <div>
                <div class="month-title" id="month-display">Janeiro</div>
                <div class="month-sub">2026</div>
            </div>
            <button class="nav-btn" id="next-btn" onclick="changeMonth(1)">›</button>
        </div>

        <div class="grid" id="calendar-grid"></div>
    </div>

    <!-- Detalhes -->
    <div class="card">
        <div id="badge-zone"></div>
        
        <div class="details-header">
            <div>
                <div class="details-title" id="details-date-title">Toque em um dia</div>
                <div class="details-sub" id="details-day-name"></div>
            </div>
            <div class="actions-div">
                <!-- Seletor de Cores de Marcação Interno -->
                <div class="color-picker" id="date-color-picker" style="display: none;">
                    <div class="marker-dot none-color" onclick="setDateColor(false)" title="Remover cor">✕</div>
                    <div class="marker-dot m-red" onclick="setDateColor('red')"></div>
                    <div class="marker-dot m-yellow" onclick="setDateColor('yellow')"></div>
                    <div class="marker-dot m-green" onclick="setDateColor('green')"></div>
                    <div class="marker-dot m-blue" onclick="setDateColor('blue')"></div>
                    <div class="marker-dot m-purple" onclick="setDateColor('purple')"></div>
                </div>
                <button class="action-btn" id="lock-btn" onclick="toggleLock()" title="Bloquear/Desbloquear" disabled>🔒</button>
            </div>
        </div>

        <textarea id="note-input" disabled placeholder="Selecione um dia..." oninput="handleNoteChange(this.value)"></textarea>
        <div id="saving-text" style="font-size: 11px; color: var(--text-muted); text-align: right; margin-top: 4px; display: none;">Salvando automaticamente…</div>
    </div>

    <!-- Link Mercado Pago -->
    <a href="SEU_LINK_MERCADO_PAGO" class="mp-btn">💙 Apoiar com Mercado Pago</a>
</div>

<script>
    const MONTHS = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    const WEEKDAYS = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

    const HOLIDAYS = {
        "0-1": "Confraternização Universal", "1-16": "Carnaval", "1-17": "Carnaval", "1-18": "Quarta-feira de Cinzas",
        "3-3": "Sexta-feira Santa", "3-5": "Páscoa", "3-21": "Tiradentes", "4-1": "Dia do Trabalho",
        "5-4": "Corpus Christi", "8-7": "Independência do Brasil", "9-12": "Nossa Sra. Aparecida",
        "10-2": "Finados", "10-15": "Proclamação da República", "10-20": "Consciência Negra", "11-25": "Natal"
    };

    const AUTO_EVENTS = {
        4: "Reunião às 19:30",
        0: "Serviço de campo às 09:00\nReunião às 18:00"
    };

    let currentMonth = new Date().getMonth();
    let currentTheme = "blue";
    let appData = {};
    let activeKey = null;
    let isLocked = true;

    try {
        const savedData = localStorage.getItem("ical_data");
        if (savedData) appData = JSON.parse(savedData);
        const savedTheme = localStorage.getItem("ical_theme");
        if (savedTheme) currentTheme = savedTheme;
    } catch(e) {}

    function setTheme(themeKey) {
        currentTheme = themeKey;
        document.body.className = "";
        if (themeKey !== "blue") document.body.classList.add("theme-" + themeKey);
        
        document.querySelectorAll(".theme-btn").forEach(btn => btn.classList.remove("active"));
        document.getElementById("btn-" + themeKey).classList.add("active");
        
        try { localStorage.setItem("ical_theme", themeKey); } catch(e) {}
        renderCalendar();
        updateDetailsSection();
    }

    function getDow(m, d) { return new Date(2026, m, d).getDay(); }
    function getAutoNote(m, d) { return AUTO_EVENTS[getDow(m, d)] || ""; }

    function getEventText(m, d) {
        const key = `${m}-${d}`;
        const dow = getDow(m, d);
        const parts = [];
        if (HOLIDAYS[key]) parts.push(HOLIDAYS[key]);
        if (AUTO_EVENTS[dow]) parts.push(AUTO_EVENTS[dow]);
        return parts.join("\n");
    }

    function renderCalendar() {
        document.getElementById("month-display").innerText = MONTHS[currentMonth];
        document.getElementById("prev-btn").disabled = currentMonth === 0;
        document.getElementById("next-btn").disabled = currentMonth === 11;

        const grid = document.getElementById("calendar-grid");
        grid.innerHTML = "";

        WEEKDAYS.forEach(d => {
            const div = document.createElement("div");
            div.className = "weekday";
            div.innerText = d;
            grid.appendChild(div);
        });

        const firstDay = new Date(2026, currentMonth, 1).getDay();
        const daysInMonth = new Date(2026, currentMonth + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
            grid.appendChild(document.createElement("div"));
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const key = `${currentMonth}-${d}`;
            const dow = getDow(currentMonth, d);
            const isEvent = !!HOLIDAYS[key] || dow === 0 || dow === 4;
            const isActive = activeKey === key;
            const isSunday = dow === 0;
            
            const entry = appData[key] || { color: false, note: "" };

            const dayDiv = document.createElement("div");
            dayDiv.className = "day";
            dayDiv.innerText = d;

            if (isSunday) dayDiv.classList.add("sunday");
            if (isEvent) dayDiv.classList.add("event-day");
            if (isActive) dayDiv.classList.add("active-focus");
            
            // Aplica a classe de cor customizada se ela existir
            if (entry.color) {
                dayDiv.classList.add("m-" + entry.color);
            }

            if (entry.note) {
                const dot = document.createElement("div");
                dot.className = "note-dot";
                dayDiv.appendChild(dot);
            }

            dayDiv.onclick = () => selectDay(d);
            grid.appendChild(dayDiv);
        }
    }

    function changeMonth(dir) {
        currentMonth += dir;
        activeKey = null;
        isLocked = true;
        renderCalendar();
        updateDetailsSection();
    }

    function selectDay(d) {
        activeKey = `${currentMonth}-${d}`;
        isLocked = true;
        renderCalendar();
        updateDetailsSection();
    }

    function updateDetailsSection() {
        const lockBtn = document.getElementById("lock-btn");
        const noteInput = document.getElementById("note-input");
        const badgeZone = document.getElementById("badge-zone");
        const colorPicker = document.getElementById("date-color-picker");

        if (!activeKey) {
            document.getElementById("details-date-title").innerText = "Toque em um dia";
            document.getElementById("details-day-name").innerText = "";
            lockBtn.disabled = true; lockBtn.innerText = "🔒"; lockBtn.className = "action-btn";
            noteInput.disabled = true; noteInput.value = ""; noteInput.placeholder = "Selecione um dia...";
            badgeZone.innerHTML = "";
            colorPicker.style.display = "none";
            return;
        }

        const d = parseInt(activeKey.split("-")[1]);
        document.getElementById("details-date-title").innerText = `${d} de ${MONTHS[currentMonth]}`;
        document.getElementById("details-day-name").innerText = WEEKDAYS[getDow(currentMonth, d)];

        const entry = appData[activeKey] || { color: false, note: "" };
        
        // Exibe o seletor de cores das datas
        colorPicker.style.display = "flex";
        document.querySelectorAll(".marker-dot").forEach(dot => dot.classList.remove("selected"));
        if (!entry.color) {
            document.querySelector(".none-color").classList.add("selected");
        } else {
            const selectedDot = document.querySelector(".marker-dot.m-" + entry.color);
            if (selectedDot) selectedDot.classList.add("selected");
        }

        // Atualiza Cadeado
        lockBtn.disabled = false;
        if (isLocked) {
            lockBtn.innerText = "🔒";
            lockBtn.className = "action-btn";
            noteInput.disabled = true;
            noteInput.placeholder = "Toque em 🔓 para editar...";
        } else {
            lockBtn.innerText = "🔓";
            lockBtn.className = "action-btn active-btn";
            noteInput.disabled = false;
            noteInput.placeholder = "Escreva aqui sua nota...";
        }

        noteInput.value = entry.note !== undefined && entry.note !== "" ? entry.note : getAutoNote(currentMonth, d);

        const eventText = getEventText(currentMonth, d);
        if (eventText) {
            badgeZone.innerHTML = `<div class="event-badge">📢 ${eventText.replace(/\n/g, '<br>')}</div>`;
        } else {
            badgeZone.innerHTML = "";
        }
    }

    function setDateColor(colorName) {
        if (!activeKey) return;
        if (!appData[activeKey]) appData[activeKey] = { color: false, note: "" };
        
        appData[activeKey].color = colorName; // Salva o nome da cor (red, yellow, etc) ou false
        saveData();
        renderCalendar();
        updateDetailsSection();
    }

    function toggleLock() {
        if (!activeKey) return;
        isLocked = !isLocked;
        updateDetailsSection();
        if (!isLocked) document.getElementById("note-input").focus();
    }

    function handleNoteChange(val) {
        if (!activeKey || isLocked) return;
        if (!appData[activeKey]) appData[activeKey] = { color: false, note: "" };
        appData[activeKey].note = val;
        
        document.getElementById("saving-text").style.display = "block";
        saveData();
        
        setTimeout(() => {
            document.getElementById("saving-text").style.display = "none";
        }, 500);
    }

    function saveData() {
        try { localStorage.setItem("ical_data", JSON.stringify(appData)); } catch(e) {}
    }

    window.onload = function() {
        setTheme(currentTheme);
    };
</script>
</body>
</html>
