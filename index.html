<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Calendar 2026 - Glassmorphism Innovation</title>
    <!-- Importação da Fonte Inter (Padrão UI Premium) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Cores Neon Suaves para contraste no tema escuro */
            --p-blue: #3b82f6; --p-green: #10b981; --p-purple: #a855f7;
            --p-orange: #f97316; --p-red: #ef4444; --p-pink: #ec4899;
            --holiday: #f59e0b; 
            --bg: #090d16; /* Fundo Deep Space/OLED */
            --card-bg: rgba(255, 255, 255, 0.04); /* Efeito Vidro */
            --card-border: rgba(255, 255, 255, 0.07);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --mp-blue: #009ee3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        /* Centralização e Efeito de Iluminação de Fundo */
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 50%);
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 16px; 
            color: var(--text-main); 
        }
        
        .app-container { 
            width: 100%; 
            max-width: 400px; 
            display: flex; 
            flex-direction: column; 
            gap: 18px; 
            justify-content: center;
        }

        /* Estilo Inovador de Vidro Espelhado */
        .calendar-card {
            background: var(--card-bg); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px; 
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
            border: 1px solid var(--card-border);
        }

        /* Cabeçalho Limpo e Futurista */
        .month-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .month-header h2 { font-weight: 800; font-size: 22px; letter-spacing: -0.5px; color: var(--text-main); text-align: center; flex-grow: 1; }
        .nav-btn { background: rgba(255,255,255,0.06); border: none; color: var(--text-main); width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-weight: 700; font-size: 15px; transition: 0.2s; display: flex; align-items: center; justify-content: center;}
        .nav-btn:active { background: rgba(255,255,255,0.15); transform: scale(0.95); }

        /* Dias da Semana Minimalistas */
        .weekday { 
            text-align: center; font-size: 11px; font-weight: 800; color: var(--text-muted); 
            text-transform: uppercase; letter-spacing: 1.5px; padding-bottom: 12px; 
        }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        
        /* Botões de Dias Circulares Estilo Display Nativos */
        .day { 
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; font-size: 14px; font-weight: 600; cursor: pointer;
            background: transparent; transition: 0.2s; position: relative; border: 1px solid transparent;
            color: #cbd5e1;
        }
        .day:hover { background: rgba(255,255,255,0.03); }
        .day.is-holiday { border: 1.5px solid var(--holiday) !important; color: var(--holiday); font-weight: 700; }
        .day.selected { outline: 2px solid var(--text-main); outline-offset: -2px; z-index: 2; font-weight: 800; }

        /* Cores de Seleção com brilho neon suave (Glow) */
        .sel-blue { background: var(--p-blue) !important; color: white !important; box-shadow: 0 0 12px rgba(59, 130, 246, 0.4); }
        .sel-green { background: var(--p-green) !important; color: white !important; box-shadow: 0 0 12px rgba(16, 185, 129, 0.4); }
        .sel-purple { background: var(--p-purple) !important; color: white !important; box-shadow: 0 0 12px rgba(168, 85, 247, 0.4); }
        .sel-orange { background: var(--p-orange) !important; color: white !important; box-shadow: 0 0 12px rgba(249, 115, 22, 0.4); }
        .sel-red { background: var(--p-red) !important; color: white !important; box-shadow: 0 0 12px rgba(239, 68, 44, 0.4); }
        .sel-pink { background: var(--p-pink) !important; color: white !important; box-shadow: 0 0 12px rgba(236, 72, 153, 0.4); }

        .has-note-dot { width: 4px; height: 4px; background: currentColor; border-radius: 50%; position: absolute; bottom: 5px; }

        /* Painel de Detalhes Inferior */
        .details-card {
            background: var(--card-bg); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px; 
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
            border: 1px solid var(--card-border);
            text-align: center;
        }

        .details-card h3 { font-weight: 700; margin-bottom: 14px; font-size: 19px; letter-spacing: -0.3px; color: var(--text-main); }

        /* Etiqueta de Feriado Fluida */
        .holiday-badge {
            display: inline-block; background: rgba(245, 158, 11, 0.12); color: var(--holiday); 
            font-size: 11px; font-weight: 700; padding: 5px 14px; border-radius: 20px; margin-bottom: 12px;
            border: 1px solid rgba(245, 158, 11, 0.2);
            white-space: pre-line; /* Permite quebras de linha na badge caso acumule mais de um evento */
        }

        /* Input Invisível com Borda Neon sutil ao focar */
        textarea {
            width: 100%; border: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.2); border-radius: 18px;
            padding: 16px; font-size: 15px; min-height: 120px; outline: none;
            color: var(--text-main); line-height: 1.5; resize: none; font-weight: 400;
            text-align: left; transition: 0.3s;
        }
        textarea:focus { border-color: rgba(255,255,255,0.25); background: rgba(0,0,0,0.35); }
        textarea::placeholder { color: #475569; }

        /* Bolhas de Seleção de Cores Minimalistas */
        .theme-hub { display: flex; justify-content: space-between; margin-bottom: 18px; background: rgba(0,0,0,0.15); padding: 8px 12px; border-radius: 20px; }
        .dot { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .dot.active { transform: scale(1.15); border-color: var(--text-main); }

        /* Botão Mercado Pago Futurista */
        .mp-btn {
            background: linear-gradient(135deg, #009ee3, #007bb5); color: white; text-align: center; padding: 16px;
            border-radius: 20px; text-decoration: none; font-weight: 700; display: block; 
            font-size: 15px; transition: 0.2s; box-shadow: 0 4px 15px rgba(0, 158, 227, 0.25);
        }
        .mp-btn:active { transform: scale(0.98); opacity: 0.95; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="calendar-card">
        <div class="month-header">
            <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
            <h2 id="month-name">Janeiro 2026</h2>
            <button class="nav-btn" onclick="changeMonth(1)">›</button>
        </div>

        <div class="theme-hub">
            <div class="dot active" style="background: var(--p-blue)" onclick="setTheme('blue', this)"></div>
            <div class="dot" style="background: var(--p-green)" onclick="setTheme('green', this)"></div>
            <div class="dot" style="background: var(--p-purple)" onclick="setTheme('purple', this)"></div>
            <div class="dot" style="background: var(--p-orange)" onclick="setTheme('orange', this)"></div>
            <div class="dot" style="background: var(--p-red)" onclick="setTheme('red', this)"></div>
            <div class="dot" style="background: var(--p-pink)" onclick="setTheme('pink', this)"></div>
        </div>

        <div id="calendar" class="grid"></div>
    </div>

    <div class="details-card">
        <div id="holiday-info" class="holiday-badge" style="display:none;"></div>
        <h3 id="selected-date-text">Toque em um dia</h3>

        <textarea id="note-input" placeholder="Escreva um lembrete..." oninput="syncWithKodular()" disabled></textarea>
    </div>

    <a href="SEU_LINK_MERCADO_PAGO" class="mp-btn">Apoiar com Mercado Pago</a>
</div>

<script>
    const holidays2026 = {
        "0-1": "Confraternização Universal", "1-16": "Carnaval", "1-17": "Carnaval", "1-18": "Quarta-feira de Cinzas",
        "3-3": "Sexta-feira Santa", "3-5": "Páscoa", "3-21": "Tiradentes", "4-1": "Dia do Trabalho",
        "5-4": "Corpus Christi", "8-7": "Independência do Brasil", "9-12": "Nossa Sra. Aparecida", 
        "10-2": "Finados", "10-15": "Proclamação da República", "10-20": "Consciência Negra", "11-25": "Natal"
    };

    let currentMonth = new Date().getMonth();
    let selectedColor = 'blue';
    let data = JSON.parse(localStorage.getItem('inf_cal_v19')) || {};
    let activeKey = null;

    function render() {
        const grid = document.getElementById('calendar');
        const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        document.getElementById('month-name').innerText = `${months[currentMonth]} 2026`;
        grid.innerHTML = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d => `<div class="weekday">${d}</div>`).join('');

        const firstDay = new Date(2026, currentMonth, 1).getDay();
        const daysInMonth = new Date(2026, currentMonth + 1, 0).getDate();

        for(let i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';

        for(let d=1; d<=daysInMonth; d++) {
            const key = `${currentMonth}-${d}`;
            const dateObj = new Date(2026, currentMonth, d);
            const dayOfWeek = dateObj.getDay(); // 0 = Domingo, 4 = Quinta-feira

            // Injeta as reuniões recorrentes na memória caso o dia esteja limpo
            if(!data[key]) {
                let autoNote = "";
                if(dayOfWeek === 4) autoNote = "Reunião às 19:30";
                if(dayOfWeek === 0) autoNote = "Serviço de campo às 09:00\nReunião às 18:00";
                data[key] = { color: null, note: autoNote };
            }
            
            // Lógica para combinar feriados estruturados com as reuniões automáticas
            let eventText = holidays2026[key] || "";
            if(dayOfWeek === 4) {
                eventText = eventText ? eventText + " | Reunião às 19:30" : "Reunião às 19:30";
            }
            if(dayOfWeek === 0) {
                const domEvents = "Serviço de campo às 09:00 / Reunião às 18:00";
                eventText = eventText ? eventText + " | " + domEvents : domEvents;
            }

            const isHolidayOrEvent = eventText !== "";
            const entry = data[key];
            
            const dayEl = document.createElement('div');
            // Se tiver reunião ou feriado, ganha a borda dourada estilizada
            dayEl.className = `day ${entry.color ? 'sel-'+entry.color : ''} ${isHolidayOrEvent ? 'is-holiday' : ''} ${activeKey === key ? 'selected' : ''}`;
            dayEl.innerHTML = `${d}${entry.note ? '<div class="has-note-dot"></div>' : ''}`;
            
            dayEl.onclick = () => {
                data[key].color = (data[key].color === selectedColor) ? null : selectedColor;
                activeKey = key;
                openDay(d, key, eventText);
                save();
            };
            grid.appendChild(dayEl);
        }
    }

    function openDay(day, key, holidayName) {
        const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        document.getElementById('selected-date-text').innerText = `${day} de ${months[currentMonth]}`;
        
        const hInfo = document.getElementById('holiday-info');
        hInfo.style.display = holidayName ? "inline-block" : "none";
        if(holidayName) hInfo.innerText = `📢 ${holidayName}`;

        const noteField = document.getElementById('note-input');
        noteField.disabled = false;
        noteField.value = data[key].note || "";
    }

    function syncWithKodular() {
        if(!activeKey) return;
        data[activeKey].note = document.getElementById('note-input').value;
        save();

        if(window.AppInventor) {
            const msg = `${activeKey}|${data[activeKey].note}`;
            window.AppInventor.setWebViewString(msg);
        }
    }

    function save() {
        localStorage.setItem('inf_cal_v19', JSON.stringify(data));
        render();
    }

    function changeMonth(dir) {
        currentMonth += dir;
        if(currentMonth < 0) currentMonth = 11;
        if(currentMonth > 11) currentMonth = 0;
        render();
    }

    function setTheme(color, el) {
        selectedColor = color;
        document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
    }

    render();
</script>
</body>
</html>
